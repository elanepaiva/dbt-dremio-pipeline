version: 2

models:
  # --- Camada de Consumo: Sumarização ---
  - name: fct_sumarizacao_nfe
    description: "Modelo principal que consolida dados de Produtos, ICMS e COFINS extraídos do MySQL."
    columns:
      - name: vProd
        description: "Valor total do produto bruto conforme extraído do XML para o banco."
        tests:
          - not_null # Regra: O valor do produto nunca pode ser nulo

      - name: status_processamento
        description: "Status atual da nota no banco de dados (Ex: OK, PROCESSADO)."
        tests:
          - accepted_values:
              values: ['OK', 'PROCESSADO', 'IMPORTADO']
              quote: true
              
      - name: vIPI
        description: "Valor do IPI do item."
        tests:
          - not_null        

  # --- Camada de Consumo: Auditoria e Regras de Negócio ---
  - name: fct_auditoria_nfe
    description: "Realiza o batimento total de impostos para detectar inconsistências fiscais globais."
    columns:
      - name: status_auditoria
        description: "Regra: Valida se o ICMS acumulado é coerente (menor ou igual) com a Base de Cálculo."
        tests:
          - accepted_values:
              values: ['SUCESSO: VALORES OK']
              severity: warn # Se aparecer 'ERRO', o dbt emitirá um alerta amarelo

      - name: total_xmls
        description: "Contagem de chaves de acesso (notas únicas) processadas."
        tests:
          - not_null

  # --- Camada de Consumo: Divergências de Itens ---
  - name: fct_divergencias
    description: "Identifica itens específicos onde o ICMS calculado (18%) diverge do valor gravado."
    columns:
      - name: diferenca
        description: "Valor da diferença encontrada entre o ICMS do banco e o ICMS esperado (18%)."
        tests:
          - not_null